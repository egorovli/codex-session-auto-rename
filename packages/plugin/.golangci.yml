version: "2"

run:
  go: "1.26"
  relative-path-mode: gomod
  modules-download-mode: readonly
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - gocognit
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nestif
    - nilerr
    - nilnil
    - nolintlint
    - predeclared
    - staticcheck
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    exhaustive:
      package-scope-only: true
      default-signifies-exhaustive: false
    gocognit:
      min-complexity: 40
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    nestif:
      min-complexity: 6
    unparam:
      check-exported: false

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
